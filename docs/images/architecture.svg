<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-arch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent-arch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#b5179e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-arch)" rx="12"/>
  <rect x="0" y="390" width="800" height="10" fill="url(#accent-arch)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">SYSTEM ARCHITECTURE</text>

  <!-- User Box -->
  <rect x="30" y="55" width="110" height="50" rx="8" fill="#2a2a4a" stroke="#f72585" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="76" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">👤 User</text>
  <text x="85" y="93" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Student / Teacher</text>

  <!-- Arrow User → Interfaces -->
  <line x1="140" y1="80" x2="175" y2="80" stroke="#f72585" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f72585"/>
    </marker>
  </defs>

  <!-- CLI Box -->
  <rect x="180" y="50" width="120" height="28" rx="6" fill="#2a2a4a" stroke="#7b2ff7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="69" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">💻 CLI (Click)</text>

  <!-- Streamlit Box -->
  <rect x="180" y="84" width="120" height="28" rx="6" fill="#2a2a4a" stroke="#7b2ff7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="103" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🌐 Streamlit UI</text>

  <!-- Arrow Interfaces → Core -->
  <line x1="300" y1="80" x2="340" y2="80" stroke="#7b2ff7" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7b2ff7"/>
    </marker>
  </defs>

  <!-- Core Engine Box -->
  <rect x="345" y="48" width="160" height="65" rx="10" fill="#1e1e3a" stroke="#f72585" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="425" y="70" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">⚙️ ReadingComp</text>
  <text x="425" y="87" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">Core Engine</text>
  <text x="425" y="103" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">core.py</text>

  <!-- Arrow Core → LLM -->
  <line x1="505" y1="80" x2="545" y2="80" stroke="#f72585" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Ollama/Gemma Box -->
  <rect x="550" y="48" width="140" height="65" rx="10" fill="#2a2a4a" stroke="#4cc9f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="70" text-anchor="middle" fill="#4cc9f0" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🤖 Ollama</text>
  <text x="620" y="87" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Gemma 3 LLM</text>
  <text x="620" y="103" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">localhost:11434</text>

  <!-- Vertical connector from Core to sub-modules -->
  <line x1="425" y1="113" x2="425" y2="145" stroke="#f72585" stroke-width="2"/>
  <line x1="100" y1="145" x2="740" y2="145" stroke="#f72585" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Sub-module 1: Passage Generator -->
  <line x1="100" y1="145" x2="100" y2="170" stroke="#f72585" stroke-width="1.5"/>
  <rect x="30" y="170" width="140" height="75" rx="8" fill="#2a2a4a" stroke="#f72585" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="192" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📖 Passage</text>
  <text x="100" y="208" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Generator</text>
  <text x="100" y="228" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">200–700 words</text>
  <text x="100" y="240" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">4 reading levels</text>

  <!-- Sub-module 2: Question Engine -->
  <line x1="240" y1="145" x2="240" y2="170" stroke="#f72585" stroke-width="1.5"/>
  <rect x="170" y="170" width="140" height="75" rx="8" fill="#2a2a4a" stroke="#f72585" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="192" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">❓ Question</text>
  <text x="240" y="208" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Engine</text>
  <text x="240" y="228" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">5 question types</text>
  <text x="240" y="240" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">multi-choice</text>

  <!-- Sub-module 3: Scoring Engine -->
  <line x1="385" y1="145" x2="385" y2="170" stroke="#f72585" stroke-width="1.5"/>
  <rect x="315" y="170" width="140" height="75" rx="8" fill="#2a2a4a" stroke="#f72585" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="385" y="192" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🏆 Scoring</text>
  <text x="385" y="208" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Engine</text>
  <text x="385" y="228" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">4 rubric levels</text>
  <text x="385" y="240" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">score_exercise()</text>

  <!-- Sub-module 4: Vocabulary Extractor -->
  <line x1="530" y1="145" x2="530" y2="170" stroke="#f72585" stroke-width="1.5"/>
  <rect x="460" y="170" width="140" height="75" rx="8" fill="#2a2a4a" stroke="#f72585" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="530" y="192" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📝 Vocabulary</text>
  <text x="530" y="208" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Extractor</text>
  <text x="530" y="228" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">VocabularyWord</text>
  <text x="530" y="240" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">word + definition</text>

  <!-- Sub-module 5: Answer Key Generator -->
  <line x1="670" y1="145" x2="670" y2="170" stroke="#f72585" stroke-width="1.5"/>
  <rect x="600" y="170" width="140" height="75" rx="8" fill="#2a2a4a" stroke="#f72585" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="192" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🔑 Answer Key</text>
  <text x="670" y="208" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11">Generator</text>
  <text x="670" y="228" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">get_answer_key()</text>
  <text x="670" y="240" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">explanations</text>

  <!-- Data Flow Labels -->
  <rect x="30" y="270" width="740" height="115" rx="8" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <text x="400" y="292" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">DATA FLOW</text>

  <!-- Flow steps -->
  <circle cx="70" cy="318" r="14" fill="#f72585"/>
  <text x="70" y="323" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">1</text>
  <text x="95" y="323" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="10">Topic + Level → Core</text>

  <circle cx="280" cy="318" r="14" fill="#7b2ff7"/>
  <text x="280" y="323" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">2</text>
  <text x="305" y="323" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="10">LLM generates passage</text>

  <circle cx="490" cy="318" r="14" fill="#4cc9f0"/>
  <text x="490" y="323" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">3</text>
  <text x="515" y="323" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="10">Questions + vocab extracted</text>

  <circle cx="70" cy="355" r="14" fill="#f72585"/>
  <text x="70" y="360" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">4</text>
  <text x="95" y="360" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="10">User answers in CLI or Web</text>

  <circle cx="280" cy="355" r="14" fill="#7b2ff7"/>
  <text x="280" y="360" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">5</text>
  <text x="305" y="360" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="10">Scoring engine evaluates</text>

  <circle cx="490" cy="355" r="14" fill="#4cc9f0"/>
  <text x="490" y="360" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">6</text>
  <text x="515" y="360" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="10">ReadingExercise returned</text>
</svg>
